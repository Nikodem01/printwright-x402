service: printwright_x402
image: <%= ENV.fetch("KAMAL_APP_IMAGE") %>

servers:
  web:
    - <%= ENV.fetch("DEPLOY_HOST") %>

proxy:
  ssl: true
  host: <%= ENV.fetch("APP_HOST") %>
  forward_headers: true
  healthcheck:
    path: /up
    interval: 3
    timeout: 3

registry: &registry
  server: <%= ENV.fetch("KAMAL_REGISTRY_SERVER", "ghcr.io") %>
  username: <%= ENV.fetch("KAMAL_REGISTRY_USERNAME") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - PRINTWRIGHT_X402_DATABASE_PASSWORD
    - SIDECAR_TOKEN
    - S3_ACCESS_KEY_ID
    - S3_SECRET_ACCESS_KEY
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - GOOGLE_GENERATIVE_AI_API_KEY
    - SENTRY_DSN
  clear:
    APP_HOST: <%= ENV.fetch("APP_HOST") %>
    MAIL_FROM: <%= ENV.fetch("MAIL_FROM") %>
    SMTP_ADDRESS: <%= ENV.fetch("SMTP_ADDRESS") %>
    SMTP_PORT: <%= ENV.fetch("SMTP_PORT", "587") %>
    SMTP_DOMAIN: <%= ENV.fetch("SMTP_DOMAIN", ENV.fetch("APP_HOST")) %>
    DB_HOST: printwright_x402-db
    SOLID_QUEUE_IN_PUMA: true
    HEDERA_NETWORK: <%= ENV.fetch("HEDERA_NETWORK", "testnet") %>
    HEDERA_ACCOUNT_ID: <%= ENV.fetch("HEDERA_ACCOUNT_ID") %>
    HEDERA_HCS_TOPIC_ID: <%= ENV.fetch("HEDERA_HCS_TOPIC_ID") %>
    HEDERA_HEARTBEAT_TOPIC_ID: <%= ENV.fetch("HEDERA_HEARTBEAT_TOPIC_ID") %>
    HEDERA_SIDECAR_URL: http://printwright_x402-sidecar:4021
    X402_FACILITATOR_URL: <%= ENV.fetch("X402_FACILITATOR_URL") %>
    X402_PAY_TO: <%= ENV.fetch("X402_PAY_TO") %>
    MIRROR_NODE_URL: <%= ENV.fetch("MIRROR_NODE_URL") %>
    S3_ENDPOINT: "<%= ENV.fetch("S3_ENDPOINT", "") %>"
    S3_REGION: <%= ENV.fetch("S3_REGION", "us-east-1") %>
    S3_BUCKET: <%= ENV.fetch("S3_BUCKET") %>
    S3_FORCE_PATH_STYLE: <%= ENV.fetch("S3_FORCE_PATH_STYLE", "false") %>
    STORAGE_URL_TTL_MINUTES: <%= ENV.fetch("STORAGE_URL_TTL_MINUTES", "10") %>
    BACKUP_S3_PREFIX: <%= ENV.fetch("BACKUP_S3_PREFIX", "database-backups") %>
    CHAT_PURCHASES_ENABLED: <%= ENV.fetch("CHAT_PURCHASES_ENABLED", "false") %>
    CHAT_MAX_SPEND_CENTS: <%= ENV.fetch("CHAT_MAX_SPEND_CENTS", "0") %>
    CHAT_DAILY_SPEND_CENTS: <%= ENV.fetch("CHAT_DAILY_SPEND_CENTS", "0") %>
    CHAT_DAILY_MESSAGE_LIMIT: <%= ENV.fetch("CHAT_DAILY_MESSAGE_LIMIT", "500") %>
    SENTRY_ENVIRONMENT: production

asset_path: /rails/public/assets

builder:
  arch: amd64

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
  backup: app exec --reuse "bin/rails backups:database"

accessories:
  db:
    image: pgvector/pgvector:pg16
    host: <%= ENV.fetch("DEPLOY_HOST") %>
    env:
      clear:
        POSTGRES_USER: printwright_x402
        POSTGRES_DB: printwright_x402_production
      secret:
        - POSTGRES_PASSWORD:PRINTWRIGHT_X402_DATABASE_PASSWORD
    files:
      - config/deploy/postgres-init.sql:/docker-entrypoint-initdb.d/printwright.sql:ro
    directories:
      - printwright_x402_postgres:/var/lib/postgresql/data
    options:
      restart: always

  sidecar:
    image: <%= ENV.fetch("SIDECAR_IMAGE") %>
    registry:
      <<: *registry
    host: <%= ENV.fetch("DEPLOY_HOST") %>
    env:
      clear:
        SIDECAR_HOST: 0.0.0.0
        SIDECAR_PORT: 4021
        HEDERA_NETWORK: <%= ENV.fetch("HEDERA_NETWORK", "testnet") %>
        HEDERA_ACCOUNT_ID: <%= ENV.fetch("HEDERA_ACCOUNT_ID") %>
        HEDERA_HCS_TOPIC_ID: <%= ENV.fetch("HEDERA_HCS_TOPIC_ID") %>
        HEDERA_HEARTBEAT_TOPIC_ID: <%= ENV.fetch("HEDERA_HEARTBEAT_TOPIC_ID") %>
        TREASURY_ACCOUNT_ID: <%= ENV.fetch("TREASURY_ACCOUNT_ID") %>
      secret:
        - SIDECAR_TOKEN
        - HEDERA_PRIVATE_KEY
        - TREASURY_PRIVATE_KEY
    options:
      restart: always
