name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  rails:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd="pg_isready" --health-interval=10s
          --health-timeout=5s --health-retries=5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/printwright_test
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Prepare database
        run: bin/rails db:test:prepare
      - name: Lint (rubocop)
        run: bin/rubocop
      - name: Static security analysis (brakeman)
        run: bin/brakeman --quiet --no-pager --exit-on-warn --exit-on-error --skip-files node_modules/,sidecar/node_modules/,mcp/node_modules/,verifier/node_modules/,wallet/node_modules/,scripts/spike/,app/assets/javascripts/hedera_wallet.js -i config/brakeman.ignore
      - name: Rails tests
        run: bin/rails test
      - name: Payment decoder fuzz and state-machine properties
        run: bin/rails test test/fuzz
      - name: System tests (headless Chrome)
        run: bin/rails test:system
      - name: Seeds boot
        run: bin/rails db:seed:replant
      - name: Restore clean test database
        run: bin/rails db:test:purge db:test:prepare
      - name: Public x402 sandbox conformance
        run: |
          bin/rails server -p 3000 > tmp/conformance-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:3000/up && break
            sleep 1
          done
          node conformance/suite.mjs --url http://127.0.0.1:3000
      - name: Log hygiene
        run: bin/log-hygiene-check
  sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sidecar tests
        working-directory: sidecar
        run: npm ci && npm audit --audit-level=high && npm test
      - name: Sidecar production image
        run: docker build -t printwright-sidecar:ci sidecar

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Load harness contract
        run: npm ci && npm audit --audit-level=high && npm run test:load && npm run test:conformance
      - name: Client SDK tests and audit
        working-directory: client
        run: npm ci && npm audit --audit-level=high && npm test

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: MCP stdio smoke
        working-directory: mcp
        run: npm ci && npm audit --audit-level=high && npm test

  wallet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Browser wallet contract, audit, and deterministic bundle
        working-directory: wallet
        run: npm ci && npm audit --audit-level=high && npm test && npm run build && git diff --exit-code -- ../app/assets/javascripts/hedera_wallet.js

  app-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rails production image
        run: docker build -t printwright-app:ci .

  verifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: PWC-1 verifier contracts and audit
        working-directory: verifier
        run: npm ci && npm audit --audit-level=high && npm test

  octoprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build plugin in stock OctoPrint 1.11.7 image
        run: docker build -t printwright-octoprint-smoke -f octoprint-printwright/Dockerfile.smoke .
      - name: Fire PrintStarted through the bundled virtual printer
        run: docker run --rm --entrypoint bash printwright-octoprint-smoke /usr/local/bin/octoprint-spike-smoke

  secret-grep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No key material in the tree
        run: |
          set -e
          # ECDSA hex keys, PEM blocks, or real-looking env assignments.
          # The deterministic wallet bundle contains public curve constants;
          # its authored source is scanned here and its build is checked above.
          ! git grep -IE '(BEGIN (EC )?PRIVATE KEY|PRIVATE_KEY=[0-9a-fA-Fx]{32,}|[0-9a-f]{96,})' \
              -- ':!*.lock' ':!*package-lock.json' ':!app/assets/javascripts/hedera_wallet.js' \
            || (echo 'possible secret material found' && exit 1)
